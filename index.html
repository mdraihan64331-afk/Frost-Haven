<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>FrostHaven | Modern E‑commerce (Fully Responsive)</title>
    <!-- Google Fonts + Font Awesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="container nav-bar">
        <div class="logo"><i class="fas fa-leaf"></i> FrostHaven</div>
        <div class="nav-icons">
          <i class="fas fa-search" style="color: #3a5a4a"></i>
          <div class="cart-icon" id="cartIconBtn">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cartCountBadge">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- hero section -->
    <section class="hero">
      <div class="hero-content">
        <h1>Elevate your everyday</h1>
        <p>
          Modern essentials, sustainable design & timeless quality — curated for
          you.
        </p>
        <button class="btn-shop" id="shopNowBtn">Shop collection →</button>
      </div>
    </section>

    <div class="container">
      <h2 class="section-title">✨ Bestsellers</h2>
      <div class="products-grid" id="productsContainer"></div>
    </div>

    <footer class="footer">
      <p>© 2025 FrostHaven — Responsive design, seamless shopping.</p>
    </footer>

    <!-- cart overlay + sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <span>Your cart 🛍️</span>
        <button class="close-cart" id="closeCartBtn">&times;</button>
      </div>
      <div class="cart-items" id="cartItemsList">
        <div class="empty-cart">
          <i class="fas fa-bag-shopping"></i><br />Your cart feels light — add
          something lovely.
        </div>
      </div>
      <div class="cart-footer">
        <div class="total-row">
          <span>Total</span>
          <span id="cartTotalPrice">$0.00</span>
        </div>
        <button class="checkout-btn" id="checkoutBtn">Checkout</button>
      </div>
    </div>

    <div id="globalToast" class="toast-msg">✨ Item added to cart</div>

    <script src="./main.js"></script>
  </body>
</html>
